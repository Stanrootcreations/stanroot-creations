<!DOCTYPE html>
<html>
<head>
    <title>Commercial Interior Projects</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="project-page">

<h1 style="text-align:center;">Commercial Interior Projects</h1>

<div class="modern-gallery">

    <div class="gallery-item">
        <img src="commercial/24a65aea-0c54-4843-8a30-cfe848ff29c9.JPG">
    </div>

    <div class="gallery-item">
        <img src="commercial/564c9fe9-bc7e-4a92-9481-586b9bcaf337.JPG">
    </div>

    <div class="gallery-item">
        <img src="commercial/767e189e-00c0-4504-9a63-cd3ccb1d5afa.JPG">
    </div>
    <div class="gallery-item">
        <img src="commercial/abb6d2a2-c3c7-4ed3-a252-21f7246f469d.JPG">
    </div>

</div>

<div style="text-align:center; margin-top:40px;">
    <a href="index.html#portfolio" class="btn">Back to Portfolio</a>
</div>
<div id="lightbox" class="lightbox">
    <span class="close">&times;</span>

    <img class="lightbox-img" id="lightbox-img">

    <div class="controls">
        <span class="prev">&#10094;</span>
        <span class="next">&#10095;</span>
    </div>

    <div class="counter" id="counter"></div>
</div>
<script>
let images = document.querySelectorAll(".gallery-item img");
let lightbox = document.getElementById("lightbox");
let lightboxImg = document.getElementById("lightbox-img");
let counter = document.getElementById("counter");

let currentIndex = 0;
let zoom = 1;

// OPEN
images.forEach((img, index) => {
    img.addEventListener("click", () => {
        currentIndex = index;
        showImage();
        lightbox.style.display = "flex";
    });
});

// SHOW IMAGE
function showImage() {
    lightboxImg.src = images[currentIndex].src;
    counter.innerText = (currentIndex + 1) + " / " + images.length;
    zoom = 1;
    lightboxImg.style.transform = "scale(1)";
}

// NEXT
document.querySelector(".next").onclick = () => {
    currentIndex = (currentIndex + 1) % images.length;
    showImage();
};

// PREV
document.querySelector(".prev").onclick = () => {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    showImage();
};

// CLOSE
document.querySelector(".close").onclick = () => {
    lightbox.style.display = "none";
};

// CLICK OUTSIDE CLOSE
lightbox.onclick = (e) => {
    if (e.target === lightbox) {
        lightbox.style.display = "none";
    }
};

// ZOOM
lightboxImg.onclick = () => {
    zoom = zoom === 1 ? 2 : 1;
    lightboxImg.style.transform = "scale(" + zoom + ")";
};

// SWIPE (MOBILE)
let startX = 0;

lightbox.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

lightbox.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) {
        document.querySelector(".next").click();
    } else if (endX - startX > 50) {
        document.querySelector(".prev").click();
    }
});
</script>
</body>
</html>
