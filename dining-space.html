<!DOCTYPE html>
<html>
<head>
    <title>Dining Space Projects</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="project-page">

<h1 style="text-align:center;">Dining Space Projects</h1>

<div class="modern-gallery">

    <div class="gallery-item">
        <img src="dining space/8e327d33-87ec-45e2-86b2-18130bd98e84.JPG">
    </div>

    <div class="gallery-item">
        <img src="dining space/3024d297-f5cb-4fdb-a373-1c12201d1e89.JPG">
    </div>

    <div class="gallery-item">
        <img src="dining space/98341ff9-869a-4e7e-9b0a-f7b43a4d5673.JPG">
    </div>
    <div class="gallery-item">
        <img src="dining space/fa289f3f-9d70-44d6-bee7-a28d45ad854b.JPG">
    </div>

</div>

<div style="text-align:center; margin-top:40px;">
    <a href="index.html#portfolio" class="btn">Back to Portfolio</a>
</div>
<div id="lightbox" class="lightbox">
    <span class="close">&times;</span>

    <img class="lightbox-img" id="lightbox-img">

    <div class="controls">
        <span class="prev">&#10094;</span>
        <span class="next">&#10095;</span>
    </div>

    <div class="counter" id="counter"></div>
</div>
<script>
let images = document.querySelectorAll(".gallery-item img");
let lightbox = document.getElementById("lightbox");
let lightboxImg = document.getElementById("lightbox-img");
let counter = document.getElementById("counter");

let currentIndex = 0;
let zoom = 1;

// OPEN
images.forEach((img, index) => {
    img.addEventListener("click", () => {
        currentIndex = index;
        showImage();
        lightbox.style.display = "flex";
    });
});

// SHOW IMAGE
function showImage() {
    lightboxImg.src = images[currentIndex].src;
    counter.innerText = (currentIndex + 1) + " / " + images.length;
    zoom = 1;
    lightboxImg.style.transform = "scale(1)";
}

// NEXT
document.querySelector(".next").onclick = () => {
    currentIndex = (currentIndex + 1) % images.length;
    showImage();
};

// PREV
document.querySelector(".prev").onclick = () => {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    showImage();
};

// CLOSE
document.querySelector(".close").onclick = () => {
    lightbox.style.display = "none";
};

// CLICK OUTSIDE CLOSE
lightbox.onclick = (e) => {
    if (e.target === lightbox) {
        lightbox.style.display = "none";
    }
};

// ZOOM
lightboxImg.onclick = () => {
    zoom = zoom === 1 ? 2 : 1;
    lightboxImg.style.transform = "scale(" + zoom + ")";
};

// SWIPE (MOBILE)
let startX = 0;

lightbox.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

lightbox.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) {
        document.querySelector(".next").click();
    } else if (endX - startX > 50) {
        document.querySelector(".prev").click();
    }
});
</script>
</body>
</html>
