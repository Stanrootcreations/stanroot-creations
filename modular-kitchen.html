<!DOCTYPE html>
<html>
<head>
    <title>Modular Kitchen Projects</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="project-page">

<h1 style="text-align:center;">Modular Kitchen Projects</h1>

<div class="modern-gallery">

    <div class="gallery-item">

    </div>

    <div class="gallery-item">
        <img src="Kitchen/4b2d8a51-1797-4473-9342-4dcc703400bc.JPG">
    </div>

    <div class="gallery-item">
        <img src="Kitchen/26b8351b-b4ff-4605-8d73-cfb29d8a72ad.JPG">
    </div>
    <div class="gallery-item">
        <img src="Kitchen/26d77466-1821-436b-8202-b34b1ad5e6e6.JPG">
    </div>

    <div class="gallery-item">
        <img src="Kitchen/0365f9d5-a0a6-44aa-af9a-718710d10d81.JPG">
    </div>

    <div class="gallery-item">
        <img src="Kitchen/6449b921-00e9-4b8f-a9f6-1c66e7691f64.JPG">
    </div>
    <div class="gallery-item">
        <img src="Kitchen/95481c2e-7afe-4076-94be-e32ee191a665.JPG">
    </div>

    <div class="gallery-item">
        <img src="Kitchen/c98d04af-62f0-42fb-9a8f-70202df1d61e.JPG">
    </div>

    <div class="gallery-item">
        <img src="Kitchen/e9817e35-442c-46fd-b2bf-3115a73fef6c.JPG">
    </div>
<div class="gallery-item">
        <img src="Kitchen/f28d7efe-cf96-44c3-9e9e-f5411fc54f98.JPG">
    </div>
</div>

<div style="text-align:center; margin-top:40px;">
    <a href="index.html#portfolio" class="btn">Back to Portfolio</a>
</div>
<div id="lightbox" class="lightbox">
    <span class="close">&times;</span>

    <img class="lightbox-img" id="lightbox-img">

    <div class="controls">
        <span class="prev">&#10094;</span>
        <span class="next">&#10095;</span>
    </div>

    <div class="counter" id="counter"></div>
</div>
<script>
let images = document.querySelectorAll(".gallery-item img");
let lightbox = document.getElementById("lightbox");
let lightboxImg = document.getElementById("lightbox-img");
let counter = document.getElementById("counter");

let currentIndex = 0;
let zoom = 1;

// OPEN
images.forEach((img, index) => {
    img.addEventListener("click", () => {
        currentIndex = index;
        showImage();
        lightbox.style.display = "flex";
    });
});

// SHOW IMAGE
function showImage() {
    lightboxImg.src = images[currentIndex].src;
    counter.innerText = (currentIndex + 1) + " / " + images.length;
    zoom = 1;
    lightboxImg.style.transform = "scale(1)";
}

// NEXT
document.querySelector(".next").onclick = () => {
    currentIndex = (currentIndex + 1) % images.length;
    showImage();
};

// PREV
document.querySelector(".prev").onclick = () => {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    showImage();
};

// CLOSE
document.querySelector(".close").onclick = () => {
    lightbox.style.display = "none";
};

// CLICK OUTSIDE CLOSE
lightbox.onclick = (e) => {
    if (e.target === lightbox) {
        lightbox.style.display = "none";
    }
};

// ZOOM
lightboxImg.onclick = () => {
    zoom = zoom === 1 ? 2 : 1;
    lightboxImg.style.transform = "scale(" + zoom + ")";
};

// SWIPE (MOBILE)
let startX = 0;

lightbox.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

lightbox.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) {
        document.querySelector(".next").click();
    } else if (endX - startX > 50) {
        document.querySelector(".prev").click();
    }
});
</script>
</body>
</html>
