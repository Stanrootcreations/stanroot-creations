<!DOCTYPE html>
<html>
<head>
    <title>Luxury Bedroom Projects</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="project-page">

<h1 style="text-align:center;">Luxury Bedroom Projects</h1>

<div class="modern-gallery">

    <div class="gallery-item">
        <img src="BedRoom/7a51f500-35ae-4823-93d7-2ffb530d8e21.JPG">
    </div>

    <div class="gallery-item">
        <img src="BedRoom/7c28b703-3f6f-4651-babe-a0cc681e6114.JPG">
    </div>

    <div class="gallery-item">
        <img src="BedRoom/1271d327-6505-417a-aac2-0ef4c3446fd0.JPG">
    </div>
    <div class="gallery-item">
        <img src="BedRoom/a1ffcac0-c99c-4e14-b0a1-53da590abdfa.JPG">
    </div>

</div>

<div style="text-align:center; margin-top:40px;">
    <a href="index.html#portfolio" class="btn">Back to Portfolio</a>
</div>
<div id="lightbox" class="lightbox">
    <span class="close">&times;</span>

    <img class="lightbox-img" id="lightbox-img">

    <div class="controls">
        <span class="prev">&#10094;</span>
        <span class="next">&#10095;</span>
    </div>

    <div class="counter" id="counter"></div>
</div>
<script>
let images = document.querySelectorAll(".gallery-item img");
let lightbox = document.getElementById("lightbox");
let lightboxImg = document.getElementById("lightbox-img");
let counter = document.getElementById("counter");

let currentIndex = 0;
let zoom = 1;

// OPEN
images.forEach((img, index) => {
    img.addEventListener("click", () => {
        currentIndex = index;
        showImage();
        lightbox.style.display = "flex";
    });
});

// SHOW IMAGE
function showImage() {
    lightboxImg.src = images[currentIndex].src;
    counter.innerText = (currentIndex + 1) + " / " + images.length;
    zoom = 1;
    lightboxImg.style.transform = "scale(1)";
}

// NEXT
document.querySelector(".next").onclick = () => {
    currentIndex = (currentIndex + 1) % images.length;
    showImage();
};

// PREV
document.querySelector(".prev").onclick = () => {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    showImage();
};

// CLOSE
document.querySelector(".close").onclick = () => {
    lightbox.style.display = "none";
};

// CLICK OUTSIDE CLOSE
lightbox.onclick = (e) => {
    if (e.target === lightbox) {
        lightbox.style.display = "none";
    }
};

// ZOOM
lightboxImg.onclick = () => {
    zoom = zoom === 1 ? 2 : 1;
    lightboxImg.style.transform = "scale(" + zoom + ")";
};

// SWIPE (MOBILE)
let startX = 0;

lightbox.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

lightbox.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) {
        document.querySelector(".next").click();
    } else if (endX - startX > 50) {
        document.querySelector(".prev").click();
    }
});
</script>
</body>
</html>
